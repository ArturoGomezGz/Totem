services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: totem-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      # El esquema ya no se inyecta aquí — lo crean las migraciones Alembic
      # al arrancar el servicio api (ver docs/capa2/migraciones-alembic.md).
      # Seed de desarrollo opcional: db/seed.dev.sql (aplicar manualmente).
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ../server
    container_name: totem-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_URL: ${SERVER_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
    volumes:
      - firmware-data:/app/data/firmware
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  mosquitto:
    image: iegomez/mosquitto-go-auth:latest
    container_name: totem-mosquitto
    command: ["/usr/sbin/mosquitto", "-c", "/mosquitto/config/mosquitto.conf"]
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ../frontend
    container_name: totem-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
  mosquitto-data:
  mosquitto-logs:
  firmware-data:
