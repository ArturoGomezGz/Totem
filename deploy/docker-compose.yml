services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: totem-db
    environment:
      POSTGRES_DB: totem
      POSTGRES_USER: totem
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U totem -d totem"]
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: totem-mosquitto
    user: root
    entrypoint: ["/bin/sh", "-c", "chown mosquitto:mosquitto /mosquitto/config/passwd && chmod 600 /mosquitto/config/passwd && exec /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf"]
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
    restart: unless-stopped

  frontend:
    build: ../frontend
    container_name: totem-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: ../server
    container_name: totem-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://totem:changeme@db:5432/totem
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_CLIENT_ID: totem-server
      MQTT_USERNAME: server
      MQTT_PASSWORD: changeme
    volumes:
      - firmware-data:/app/data/firmware
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped

volumes:
  db-data:
  mosquitto-data:
  mosquitto-logs:
  firmware-data:
